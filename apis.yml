description: >-
  Brunswick Corporation is a global leader in marine recreation and technology, headquartered
  in Mettawa, Illinois (NYSE: BC). Brunswick owns over 60 brands across marine propulsion
  (Mercury Marine, Mercury Racing, MerCruiser, Fliteboard), boat manufacturing (Boston Whaler,
  Sea Ray, Bayliner, Lund, Crestliner, Harris, Lowe, heyday), and marine parts and accessories
  (Navico Group: B&G, C-Map, Lowrance, Simrad). The company's ACES innovation strategy
  centers on Autonomy/Assistance, Connectivity, Electrification, and Shared Access.
